here<!DOCTYPE html>
<html>
<head>

<title>REAL MATCH AI</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

button,select{
padding:12px;
margin:5px;
border-radius:10px;
border:0;
font-weight:bold;
}

button{
background:gold;
}

.box{
background:#222;
margin:15px;
padding:15px;
border-radius:15px;
}

</style>

</head>

<body>


<h1>⚽ REAL MATCH AI</h1>


<div class="box">

<button onclick="loadMatches()">
📅 โหลดโปรแกรมจริง
</button>


<select id="match">
<option>รอโหลด...</option>
</select>


<br>


<button onclick="predict()">
🧠 AI วิเคราะห์
</button>


</div>


<div class="box" id="result">
รอข้อมูล...
</div>



<script>


let games=[];


// โหลดโปรแกรม
function loadMatches(){


document.getElementById("match").innerHTML=
"<option>กำลังโหลด...</option>";


fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328"
)


.then(r=>r.json())


.then(data=>{


games=data.events;


let html="";


games.forEach((x,i)=>{

html+=`

<option value="${i}">
${x.strHomeTeam} VS ${x.strAwayTeam}
</option>

`;

});


document.getElementById("match").innerHTML=html;


document.getElementById("result").innerHTML=
"✅ โหลดโปรแกรมสำเร็จ";


})


.catch(()=>{

document.getElementById("result").innerHTML=
"❌ โหลดไม่ได้";

});


}



// AI
function predict(){

let i=document.getElementById("match").value;

let game=games[i];

if(!game){
return;
}


// จำลองค่า AI วิเคราะห์
let homeAttack = Math.floor(Math.random()*50)+50;
let awayAttack = Math.floor(Math.random()*50)+50;

let homeDefense = Math.floor(Math.random()*50)+50;
let awayDefense = Math.floor(Math.random()*50)+50;


// คำนวณโอกาส
let homePower = homeAttack + homeDefense;
let awayPower = awayAttack + awayDefense;

let total = homePower + awayPower;


let homeWin = Math.round(homePower / total * 100);
let awayWin = 100 - homeWin;

let draw = Math.floor(
100 - homeWin - awayWin
);


// ประตูคาดการณ์

let homeGoal = Math.floor(homeAttack / 35);

let awayGoal = Math.floor(awayAttack / 35);


// สูงต่ำ

let totalGoal = homeGoal + awayGoal;

let over = totalGoal >= 3 
? "🔥 มีโอกาสสูง 2.5"
: "🧊 มีโอกาสต่ำ 2.5";


// BTTS

let btts = homeGoal>0 && awayGoal>0
? "✅ ยิงกันทั้งสองทีม"
: "❌ มีโอกาสไม่ยิงทั้งคู่";


// แสดงผล

document.getElementById("result").innerHTML =

"🧠 AI PRO ANALYSIS<br><br>"+

"⚽ "+game.strHomeTeam+
" VS "+
game.strAwayTeam+

"<br><br>"+

"📊 WIN PROBABILITY<br>"+
"🏠 "+homeWin+"%<br>"+
"🤝 "+draw+"%<br>"+
"🚀 "+awayWin+"%"+

"<br><br>"+

"🎯 SCORE PREDICT<br>"+
"<h2>"+homeGoal+
" - "+
awayGoal+
"</h2>"+

over+
"<br>"+
btts+

"<br><br>🔥 AI Confidence "+
(Math.floor(Math.random()*20)+70)+"%";


}
