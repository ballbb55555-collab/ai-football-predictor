here<!DOCTYPE html>
<html>
<head>
<title>AI Football Predictor PRO</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

select,button{
padding:12px;
margin:5px;
border-radius:10px;
border:0;
font-weight:bold;
}

button{
background:gold;
}

.box{
background:#222;
margin:15px;
padding:20px;
border-radius:15px;
}
</style>

</head>

<body>

<h1>⚽ AI FOOTBALL PREDICTOR PRO</h1>

<div class="box">

<select id="home">
<option>Manchester United</option>
<option>Liverpool</option>
<option>Arsenal</option>
<option>Manchester City</option>
<option>Chelsea</option>
</select>

<br>

VS

<br>

<select id="away">
<option>Liverpool</option>
<option>Manchester United</option>
<option>Real Madrid</option>
<option>Barcelona</option>
<option>Bayern Munich</option>
</select>

<br><br>

<button onclick="predict()">
🧠 AI วิเคราะห์
</button>

<p id="result">
รอวิเคราะห์...
</p>

</div>


<script>

function predict(){

let home =
document.getElementById("home").value;

let away =
document.getElementById("away").value;


let h =
Math.floor(Math.random()*4);

let a =
Math.floor(Math.random()*4);


let win="";

if(h>a){
win="🏠 ทีมเหย้ามีโอกาสชนะ";
}
else if(h<a){
win="🚀 ทีมเยือนมีโอกาสชนะ";
}
else{
win="🤝 มีโอกาสเสมอ";
}


document.getElementById("result").innerHTML=

"⚽ "+home+" VS "+away+
"<br><br>"+
"🎯 สกอร์คาดการณ์<br>"+
"<h2>"+h+" - "+a+"</h2>"+
win+
"<br><br>🔥 ความมั่นใจ "+
(60+Math.floor(Math.random()*30))+"%";

}

</script>

</body>
</html>
