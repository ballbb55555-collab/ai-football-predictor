here<!DOCTYPE html>
<html>
<head>

<title>FINAL AI FOOTBALL APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#080808;
color:white;
font-family:Arial;
text-align:center;
}

.header{
padding:20px;
font-size:25px;
font-weight:bold;
color:gold;
}

.card{
background:#171717;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px #333;
}

button,select{
padding:12px;
margin:5px;
border:0;
border-radius:10px;
font-weight:bold;
}

button{
background:gold;
color:black;
}

select{
width:90%;
}


.team{
font-size:18px;
font-weight:bold;
}


.score{
font-size:35px;
color:gold;
}


.green{
color:#00ff66;
}


.red{
color:#ff4444;
}


</style>

</head>


<body>


<div class="header">
⚽ FINAL AI FOOTBALL APP
</div>



<div class="card">

<button onclick="loadMatches()">
🔄 โหลดโปรแกรมบอล
</button>


<br>
<select id="league">
<option value="all">🌍 ทุกลีก</option>
<option value="4328">🇬🇧 พรีเมียร์ลีก</option>
<option value="4335">🇪🇸 ลาลีกา</option>
<option value="4331">🇩🇪 บุนเดสลีกา</option>
<option value="4332">🇮🇹 กัลโช่ เซเรีย อา</option>
<option value="4334">🇫🇷 ลีกเอิง</option>
<option value="4330">🇳🇱 เอเรดิวิซี</option>
<option value="4337">🇵🇹 โปรตุเกส</option>
<option value="4346">🇺🇸 MLS</option>
</select>

<select id="match">

<option>
รอโหลดข้อมูล
</option>

</select>


<br>


<button onclick="analysis()">
🧠 AI ANALYSIS
</button>


</div>



<div class="card" id="matches">

กำลังรอข้อมูล...

</div>



<div class="card" id="result">

AI พร้อมวิเคราะห์

</div>
<script>

let games=[];


// โหลดโปรแกรม

function loadMatches(){


document.getElementById("matches").innerHTML=
"⏳ กำลังโหลด...";


let today =
new Date().toISOString().slice(0,10);
let league =
document.getElementById("league").value;

fetch(
`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${league}`
)
.then(res=>res.json())


.then(data=>{


games=data.events || [];


let option="";
let list="";



games.forEach((m,i)=>{


option+=`

<option value="${i}">
${m.strHomeTeam} VS ${m.strAwayTeam}
</option>

`;



list+=`

<div class="card">

<div class="team">
${m.strHomeTeam}
<br>
VS
<br>
${m.strAwayTeam}
</div>


<div class="score">

${m.intHomeScore ?? "-"}
 -
${m.intAwayScore ?? "-"}

</div>


<div class="green">

${m.strStatus || "Scheduled"}

</div>


</div>

`;



});



document.getElementById("match").innerHTML =
option || "<option>ไม่มีคู่แข่ง</option>";



document.getElementById("matches").innerHTML =
list || "วันนี้ไม่มีข้อมูล";



})


.catch(()=>{


document.getElementById("matches").innerHTML=
"❌ โหลดข้อมูลไม่ได้";


});


}



// AI วิเคราะห์

function analysis(){


let id=
document.getElementById("match").value;


let game=
games[id];



if(!game){


document.getElementById("result").innerHTML=
"กรุณาโหลดโปรแกรมก่อน";


return;

}



let home =
Math.floor(Math.random()*4);


let away =
Math.floor(Math.random()*4);



let winHome =
Math.floor(Math.random()*30)+50;


let winAway =
Math.floor(Math.random()*25)+20;


let draw =
100-winHome-winAway;



let over =
(home+away)>=3
?
"🔥 สูง 2.5 มีโอกาส"
:
"🧊 ต่ำ 2.5 มีโอกาส";



let btts =
(home>0 && away>0)
?
"✅ ยิงกันทั้งสองทีม"
:
"❌ BTTS ต่ำ";



let result="";


if(home>away)
result="🏠 เจ้าบ้านได้เปรียบ";

else if(home<away)
result="🚀 ทีมเยือนได้เปรียบ";

else
result="🤝 มีโอกาสเสมอ";




document.getElementById("result").innerHTML=


"🧠 FINAL AI RESULT<br><br>"+


game.strHomeTeam+
" VS "+
game.strAwayTeam+

"<br><br>"+


"📊 WIN PROBABILITY<br>"+
"🏠 "+winHome+"%<br>"+
"🤝 "+draw+"%<br>"+
"🚀 "+winAway+"%"+


"<br><br>"+


"🎯 SCORE PREDICT"+

"<div class='score'>"+
home+
" - "+
away+
"</div>"+


result+

"<br><br>"+

over+
"<br>"+
btts+

"<br><br>"+

"🔥 AI CONFIDENCE "+
(Math.floor(Math.random()*20)+75)+
"%";


}


</script>


</body>
</html>
