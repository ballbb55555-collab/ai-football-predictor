here<!DOCTYPE html>
<html>
<head>

<title>AI FOOTBALL PRO V3</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
⚽ AI FOOTBALL PRO
<p>ระบบวิเคราะห์ฟุตบอลอัจฉริยะ</p>
</header>


<div class="container">


<div class="card">

<h2>เลือกการแข่งขัน</h2>


<input 
id="searchLeague"
placeholder="ค้นหาลีก เช่น Premier League">


<select id="league" onchange="loadTeams()">
<option value="">เลือกลีก</option>
<option value="39">พรีเมียร์ลีก อังกฤษ</option>
<option value="140">ลาลีกา สเปน</option>
<option value="135">กัลโช่ อิตาลี</option>
<option value="78">บุนเดสลีกา เยอรมัน</option>
<option value="61">ลีกเอิง ฝรั่งเศส</option>
<option value="292">ไทยลีก</option>
</select>


<select id="home">
<option>เลือกทีมเหย้า</option>
</select>


<select id="away">
<option>เลือกทีมเยือน</option>
</select>


<button onclick="analyze()">
🤖 วิเคราะห์ AI
</button>


</div>



<div class="card">

<h2>ผลวิเคราะห์</h2>

<div id="result">

กรุณาเลือกทีม

</div>

</div>


</div>


<script src="app.js"></script>

</body>
</html>
