here<!DOCTYPE html>
<html>
<head>

<title>REAL MATCH AI</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

button,select{
padding:12px;
margin:5px;
border-radius:10px;
border:0;
font-weight:bold;
}

button{
background:gold;
}

.box{
background:#222;
margin:15px;
padding:15px;
border-radius:15px;
}

</style>

</head>

<body>


<h1>⚽ REAL MATCH AI</h1>


<div class="box">

<button onclick="loadMatches()">
📅 โหลดโปรแกรมจริง
</button>


<select id="match">
<option>รอโหลด...</option>
</select>


<br>


<button onclick="predict()">
🧠 AI วิเคราะห์
</button>


</div>


<div class="box" id="result">
รอข้อมูล...
</div>



<script>


let games=[];


// โหลดโปรแกรม
function loadMatches(){


document.getElementById("match").innerHTML=
"<option>กำลังโหลด...</option>";


fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328"
)


.then(r=>r.json())


.then(data=>{


games=data.events;


let html="";


games.forEach((x,i)=>{

html+=`

<option value="${i}">
${x.strHomeTeam} VS ${x.strAwayTeam}
</option>

`;

});


document.getElementById("match").innerHTML=html;


document.getElementById("result").innerHTML=
"✅ โหลดโปรแกรมสำเร็จ";


})


.catch(()=>{

document.getElementById("result").innerHTML=
"❌ โหลดไม่ได้";

});


}



// AI
function predict(){


let i=document.getElementById("match").value;


let game=games[i];


if(!game){

return;

}



let home=
Math.floor(Math.random()*4);


let away=
Math.floor(Math.random()*4);



let text="";


if(home>away){

text="🏠 ทีมเหย้ามีโอกาสชนะ";

}

else if(home<away){

text="🚀 ทีมเยือนมีโอกาสชนะ";

}

else{

text="🤝 มีโอกาสเสมอ";

}



document.getElementById("result").innerHTML=

"⚽ "+game.strHomeTeam+
" VS "+
game.strAwayTeam+

"<br><br>"+

"🎯 สกอร์คาดการณ์<br>"+

"<h2>"+home+" - "+away+"</h2>"+

text+

"<br><br>🔥 Confidence "+
(60+Math.floor(Math.random()*30))+
"%";


}



</script>


</body>
</html>
