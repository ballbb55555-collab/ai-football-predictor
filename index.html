here<!DOCTYPE html>
<html>
<head>

<title>LIVE MATCH MODE</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

button,select{
padding:12px;
margin:5px;
border-radius:10px;
border:0;
font-weight:bold;
}

button{
background:gold;
}

.box{
background:#222;
margin:10px;
padding:15px;
border-radius:15px;
}

.match{
background:#333;
margin:8px;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>


<h1>⚽ LIVE MATCH AI</h1>


<div class="box">

<button onclick="loadLive()">
🔥 โหลดหลายคู่
</button>


<select id="match">
<option>รอโหลด...</option>
</select>


<br>


<button onclick="ai()">
🧠 AI วิเคราะห์
</button>

</div>


<div class="box" id="list">
รอข้อมูล...
</div>


<div class="box" id="result">
AI รอทำงาน
</div>



<script>


let matches=[];


// โหลดหลายคู่

function loadLive(){


document.getElementById("list").innerHTML=
"⏳ กำลังโหลด...";


fetch(

`https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${new Date().toISOString().slice(0,10)}&s=Soccer`

.then(r=>r.json())


.then(data=>{


matches=data.events || [];


let option="";


let html="";


matches.forEach((m,i)=>{


option+=`

<option value="${i}">
${m.strHomeTeam} VS ${m.strAwayTeam}
</option>

`;


html+=`

<div class="match">

⚽ ${m.strHomeTeam}

<br>

VS

<br>

⚽ ${m.strAwayTeam}

<br>

📅 ${m.dateEvent}

</div>

`;

});


document.getElementById("match").innerHTML=option;


document.getElementById("list").innerHTML=
html || "ไม่มีโปรแกรม";


})


.catch(()=>{

document.getElementById("list").innerHTML=
"❌ โหลดไม่ได้";

});


}



// AI

function ai(){


let id=document.getElementById("match").value;


let m=matches[id];


if(!m)return;


let home=Math.floor(Math.random()*4);

let away=Math.floor(Math.random()*4);


let result="";


if(home>away)
result="🏠 เจ้าบ้านได้เปรียบ";

else if(home<away)
result="🚀 ทีมเยือนเหนือกว่า";

else
result="🤝 สูสี";



document.getElementById("result").innerHTML=

"🧠 LIVE AI RESULT<br><br>"+

m.strHomeTeam+
" VS "+
m.strAwayTeam+

"<br><br>"+

"🎯 SCORE<br>"+

"<h2>"+
home+" - "+away+
"</h2>"+

result+

"<br><br>🔥 Confidence "+
(70+Math.floor(Math.random()*25))+
"%";


}


</script>


</body>
</html>
