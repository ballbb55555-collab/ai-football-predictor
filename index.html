here<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Football App</title>

<style>
body{
background:#090909;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

button{
padding:12px;
margin:5px;
border:0;
border-radius:8px;
background:gold;
font-weight:bold;
}

.card{
background:#171717;
margin:10px;
padding:15px;
border-radius:12px;
}

.gold{
color:gold;
}
</style>

</head>

<body>

<h1>⚽ AI FOOTBALL APP</h1>

<button onclick="matches()">📅 โปรแกรม</button>
<button onclick="ai()">🧠 AI ทายสกอร์</button>

<div id="box">
กดปุ่มเริ่ม
</div>


<script>

const API =
"https://www.thesportsdb.com/api/v1/json/3";


function matches(){

document.getElementById("box").innerHTML="กำลังโหลด...";

fetch(API+"/eventsnextleague.php?id=4328")

.then(r=>r.json())

.then(data=>{

let html="";

if(!data.events){
html="ไม่มีข้อมูล";
}

else{

data.events.slice(0,10).forEach(x=>{

html+=`

<div class="card">

<b>${x.strHomeTeam}</b>

<br>
VS
<br>

<b>${x.strAwayTeam}</b>

<br>

<small>
${x.dateEvent}
</small>

</div>

`;

});

}

document.getElementById("box").innerHTML=html;

})

.catch(e=>{

document.getElementById("box").innerHTML=
"API โหลดไม่ได้";

});

}



function ai(){

let home=
Math.floor(Math.random()*3);

let away=
Math.floor(Math.random()*3);


document.getElementById("box").innerHTML=

`

<div class="card">

<h2 class="gold">
🧠 AI Prediction
</h2>

สกอร์คาดการณ์

<h1>
${home} - ${away}
</h1>

ความมั่นใจประมาณ

${60+Math.floor(Math.random()*30)}%

</div>

`;

}

</script>


</body>
</html>
