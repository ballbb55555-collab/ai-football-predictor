<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Football Analyst</title>

<style>
body{
margin:0;
background:#070707;
color:white;
font-family:Arial;
}
header{
padding:20px;
text-align:center;
background:#111;
color:#ffd700;
font-size:25px;
font-weight:bold;
}
.card{
background:#171717;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px #000;
}
.team{
display:flex;
justify-content:center;
gap:40px;
text-align:center;
}
.team img{
width:70px;
height:70px;
object-fit:contain;
}
.name{
font-size:18px;
}
.box{
background:#222;
padding:10px;
margin-top:10px;
border-radius:10px;
}
button{
background:#ffd700;
border:0;
padding:12px;
width:100%;
font-weight:bold;
border-radius:10px;
}
input{
width:95%;
padding:10px;
margin:5px;
border-radius:8px;
border:0;
}
.green{color:#00ff88}
.red{color:#ff5555}
</style>

</head>

<body>

<header>
🤖 AI FOOTBALL ANALYST ⚽
</header>


<div class="card">

<div class="team">
<div class="team">

<div>
<img id="homeLogo" src="">
<div id="homeName" class="name">ทีมเหย้า</div>
</div>

<div>
<h2>VS</h2>
</div>

<div>
<img id="awayLogo" src="">
<div id="awayName" class="name">ทีมเยือน</div>
</div>

</div>


<div class="box">
📊 ตารางคะแนน
<br>
อันดับ 5 VS อันดับ 3
</div>


<div class="box">
💰 ราคาบอล
<br>
ต่อ Team A -0.5
</div>


<div class="box">
⚽ สูงต่ำ
<br>
สูง 2.5 : 64%
</div>


<div class="box">
🔥 BTTS
<br>
YES : 59%
</div>


<div class="box">
🤖 AI Prediction

<br><br>

เจ้าบ้านชนะ 46%<br>
เสมอ 28%<br>
ทีมเยือนชนะ 26%

<br><br>

สกอร์คาดการณ์
<h2>2 - 1</h2>

</div>

</div>



<div class="card">

<h2>🔐 ADMIN PANEL</h2>

<input placeholder="ชื่อทีมเหย้า">

<input placeholder="ชื่อทีมเยือน">

<input placeholder="URL โลโก้ทีม">

<input placeholder="ราคาบอล">

<input placeholder="สูงต่ำ">

<input placeholder="BTTS">

<button>
บันทึกข้อมูล
</button>


</div>


</body>
</html>
<script src="app.js"></script>

<script>

let match = JSON.parse(localStorage.getItem("matchData"));


if(match){

document.querySelector(".name").innerHTML = match.home;

document.querySelectorAll(".name")[1].innerHTML = match.away;


document.querySelectorAll(".team img")[0].src = match.logo1;

document.querySelectorAll(".team img")[1].src = match.logo2;


document.querySelector(".box:nth-of-type(2)").innerHTML =
"💰 ราคาบอล<br>"+match.odds;


document.querySelector(".box:nth-of-type(3)").innerHTML =
"⚽ สูงต่ำ<br>"+match.ou;


document.querySelector(".box:nth-of-type(4)").innerHTML =
"🔥 BTTS<br>"+match.btts;

}

</script>
