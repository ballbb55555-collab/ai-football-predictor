here<!DOCTYPE html>
<html>
<head>
<title>AI Football PRO</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

button,select{
padding:12px;
margin:5px;
border-radius:10px;
border:0;
font-weight:bold;
}

button{
background:gold;
}

.box{
background:#222;
margin:15px;
padding:15px;
border-radius:15px;
}

</style>

</head>

<body>

<h1>⚽ AI FOOTBALL PRO</h1>

<div class="box">

<button onclick="loadMatches()">
📅 โหลดโปรแกรม
</button>

<br>

<select id="match">
<option>กดโหลดโปรแกรมก่อน</option>
</select>

<br>

<button onclick="aiPredict()">
🧠 AI PRO วิเคราะห์
</button>

</div>


<div class="box" id="result">
รอข้อมูล...
</div>


<script>

let games=[];


function loadMatches(){

document.getElementById("result").innerHTML=
"⏳ กำลังโหลด...";


fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328"
)

.then(res=>res.json())

.then(data=>{


games=data.events || [];


let html="";


games.forEach((m,i)=>{

html+=`

<option value="${i}">
${m.strHomeTeam} VS ${m.strAwayTeam}
</option>

`;

});


document.getElementById("match").innerHTML=html;


document.getElementById("result").innerHTML=
"✅ โหลดสำเร็จ เลือกคู่แล้วกด AI";


})


.catch(()=>{

document.getElementById("result").innerHTML=
"❌ โหลดข้อมูลไม่ได้";

});


}



function aiPredict(){


let id=document.getElementById("match").value;


let m=games[id];


if(!m){

document.getElementById("result").innerHTML=
"กรุณาโหลดโปรแกรมก่อน";

return;

}



let home=Math.floor(Math.random()*3);

let away=Math.floor(Math.random()*3);


let result="";


if(home>away)
result="🏠 เจ้าบ้านมีโอกาสชนะ";

else if(home<away)
result="🚀 ทีมเยือนมีโอกาสชนะ";

else
result="🤝 มีโอกาสเสมอ";



document.getElementById("result").innerHTML=

"🧠 AI PRO RESULT<br><br>"+

"⚽ "+m.strHomeTeam+
" VS "+
m.strAwayTeam+

"<br><br>"+

"🎯 สกอร์คาดการณ์<br>"+

"<h2>"+
home+" - "+away+
"</h2>"+

result+

"<br><br>🔥 Confidence "+
(70+Math.floor(Math.random()*25))+
"%";


}

</script>

</body>
</html>
