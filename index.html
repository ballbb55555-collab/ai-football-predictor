here<!DOCTYPE html>
<html>
<head>

<title>FINAL AI FOOTBALL APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#080808;
color:white;
font-family:Arial;
text-align:center;
}

.header{
padding:20px;
font-size:25px;
font-weight:bold;
color:gold;
}

.card{
background:#171717;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px #333;
}

button,select{
padding:12px;
margin:5px;
border:0;
border-radius:10px;
font-weight:bold;
}

button{
background:gold;
color:black;
}

select{
width:90%;
}


.team{
font-size:18px;
font-weight:bold;
}


.score{
font-size:35px;
color:gold;
}


.green{
color:#00ff66;
}


.red{
color:#ff4444;
}


</style>

</head>


<body>


<div class="header">
⚽ FINAL AI FOOTBALL APP
</div>



<div class="card">

<button onclick="loadMatches()">
🔄 โหลดโปรแกรมบอล
</button>


<br>
<select id="league">
<option value="all">🌍 ทุกลีก</option>
<option value="4328">🇬🇧 พรีเมียร์ลีก</option>
<option value="4335">🇪🇸 ลาลีกา</option>
<option value="4331">🇩🇪 บุนเดสลีกา</option>
<option value="4332">🇮🇹 กัลโช่ เซเรีย อา</option>
<option value="4334">🇫🇷 ลีกเอิง</option>
<option value="4330">🇳🇱 เอเรดิวิซี</option>
<option value="4337">🇵🇹 โปรตุเกส</option>
<option value="4346">🇺🇸 MLS</option>
</select>

<select id="match">

<option>
รอโหลดข้อมูล
</option>

</select>


<br>


<button onclick="analysis()">
🧠 AI ANALYSIS
</button>


</div>



<div class="card" id="matches">

กำลังรอข้อมูล...

</div>



<div class="card" id="result">

AI พร้อมวิเคราะห์

</div>
<script>

let games=[];


// โหลดโปรแกรม
function loadMatches(){

document.getElementById("matches").innerHTML =
"⏳ กำลังโหลดหลายลีก...";


let leagues = [
4328, // พรีเมียร์ลีก
4335, // ลาลีกา
4331, // บุนเดสลีกา
4332, // เซเรียอา
4334  // ลีกเอิง
];


let requests = leagues.map(id =>

fetch(
`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${id}`
)
.then(r=>r.json())

);



Promise.all(requests)

.then(results=>{


games=[];

let html="";
let option="";


results.forEach(data=>{


if(data.events){


data.events.forEach(m=>{


games.push(m);


let index = games.length-1;


option +=`

<option value="${index}">
${m.strHomeTeam} VS ${m.strAwayTeam}
</option>

`;


html +=`

<div class="card">

⚽ ${m.strHomeTeam}

<br>

VS

<br>

⚽ ${m.strAwayTeam}

</div>

`;

});


}


});



document.getElementById("match").innerHTML =
option || "<option>ไม่มีคู่</option>";


document.getElementById("matches").innerHTML =
html || "ไม่มีโปรแกรม";



})


.catch(()=>{


document.getElementById("matches").innerHTML =
"❌ โหลดข้อมูลไม่ได้";


});


}
function analysis() {
   ...
}

</script>
</body>
</html>
